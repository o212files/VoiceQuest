<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceQuest - Intonation Game</title>
    <style>
        /* --- DESIGN SYSTEM & CSS VARIABLES --- */
        :root {
            --bg-dark: #121214;
            --studio-panel: #1e1e24;
            --accent-neon: #00ffcc;
            --accent-glow: rgba(0, 255, 204, 0.4);
            --text-light: #f5f5f7;
            --text-muted: #a0a0aa;
            --correct-green: #39ff14;
            --incorrect-red: #ff3131;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: var(--font-family);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- GLOBAL LAYOUT --- */
        .container {
            width: 90%;
            max-width: 900px;
            background: var(--studio-panel);
            border: 2px solid #333;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            position: relative;
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        /* --- THEATRE CURTAIN ANIMATION --- */
        .curtain-layer {
            position: fixed;
            top: 0;
            width: 50vw;
            height: 100vh;
            background: linear-gradient(to right, #7a0010, #d90429, #4a000a);
            z-index: 100;
            transition: transform 1.2s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }
        #curtain-left { left: 0; transform: translateX(0); border-right: 3px solid #ffd700; }
        #curtain-right { right: 0; transform: translateX(0); border-left: 3px solid #ffd700; }
        
        body.game-started #curtain-left { transform: translateX(-100%); }
        body.game-started #curtain-right { transform: translateX(100%); }

        /* --- TYPOGRAPHY & BUTTONS --- */
        h1 {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent-neon);
            text-shadow: 0 0 10px var(--accent-glow);
            margin-bottom: 20px;
            text-align: center;
        }

        p {
            line-height: 1.6;
            margin-bottom: 20px;
            font-size: 1.1rem;
        }

        .btn {
            background: transparent;
            color: var(--text-light);
            border: 2px solid var(--accent-neon);
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
            display: inline-block;
            margin: 10px 0;
        }

        .btn:hover {
            background: var(--accent-neon);
            color: var(--bg-dark);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
            background: transparent;
            box-shadow: none;
            transform: none;
        }

        /* --- GAME HEADER HUD --- */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .hud-score { color: var(--accent-neon); }

        /* --- SCREEN: WELCOME --- */
        #welcome-screen {
            text-align: center;
            padding: 20px;
        }
        .intro-text {
            max-width: 600px;
            margin: 0 auto 30px auto;
            color: var(--text-light);
            font-size: 1.2rem;
        }

        /* --- SCREEN: GAMEPLAY STUDIO --- */
        .studio-layout {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        /* Audio & Video Elements */
        .media-box {
            background: #151518;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 200px;
        }
        audio, video {
            width: 100%;
            max-width: 500px;
            margin-top: 10px;
            border-radius: 4px;
        }
        video {
            background: #000;
            max-height: 280px;
        }

        /* Options Grid */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
        .option-btn {
            background: #25252b;
            color: var(--text-light);
            border: 1px solid #444;
            padding: 15px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .option-btn:hover:not(:disabled) {
            border-color: var(--accent-neon);
            background: #2a2a35;
        }
        .option-btn.correct {
            background: rgba(57, 255, 20, 0
